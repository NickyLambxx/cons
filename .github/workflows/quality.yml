name: Проверка сайта

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Получить код
        uses: actions/checkout@v4

      - name: Настроить Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Проверить сайт
        run: npm run check
